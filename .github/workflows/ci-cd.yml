name: WordFlow CI/CD Pipeline

# ─── Ne Zaman Tetiklenir? ─────────────────────────────────────
on:
  push:
    branches: [main, develop]   
  pull_request:
    branches: [main]        

jobs:
  test:
    name: 🧪 Testleri Çalıştır
    runs-on: ubuntu-latest

    steps:
      - name: Kodu Çek
        uses: actions/checkout@v4

      - name: Docker Image Build Et
        run: |
          docker build -t wordflow-test ./backend

      - name: Testleri Çalıştır
        run: |
          docker run wordflow-test \
            pytest tests/ -v --cov=lambda --cov-report=term

      - name: Test Sonuçlarını Sakla
        uses: actions/upload-artifact@v4
        if: always()   
        with:
          name: test-results
          path: coverage-reports/

  build:
    name: 🐳 Production Image Build Et
    runs-on: ubuntu-latest
    needs: test   
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Kodu Çek
        uses: actions/checkout@v4

      - name: Image Build Et
        run: |
          docker build -t wordflow-backend:${{ github.sha }} \
                       -t wordflow-backend:latest \
                       ./backend
          echo "✅ Image başarıyla build edildi!"
          echo "📦 wordflow-backend:${{ github.sha }}"